version: 1
id: delegated_credential_exfil_diamond
description: |
  Diamond DAG pattern: a delegated multi-agent attack where one
  parent invocation spawns two sub-agents that perform recon in
  parallel (read /etc/shadow and dump environment secrets), then a
  third agent exfiltrates the joined result.

  Steps complete order-independently between the two recon branches
  -- the recon agents may race -- and the rule fires only when both
  branches AND the exfil are done. This is the kind of pattern a
  linear-DSL rule cannot express: it would either over-trigger (if
  it ignored ordering) or under-trigger (if it pinned recon to a
  specific order).

  ``correlate_by: [tenant_id, correlation_id]`` makes the rule span
  every agent in the delegation tree. Resolve correlation_id from
  an invocation via ``kya.attack_chains.correlation_id_for_invocation``.
severity: critical
emits_signal: rogue_delegated_credential_exfil_diamond
correlate_by:
  - tenant_id
  - correlation_id
mode: dag
window_seconds: 900    # 15 min global cap
steps:
  - id: spawn
    evidence_kind: tool_call
    match:
      payload.tool: agent_spawn
  - id: recon_shadow
    evidence_kind: tool_call
    match:
      payload.tool: file_read
      payload.path: "glob:/etc/shadow*"
    after: spawn
    within_seconds: 300
  - id: recon_env
    evidence_kind: tool_call
    match:
      payload.tool: env_read
      payload.key: "glob:*SECRET*"
    after: spawn
    within_seconds: 300
  - id: exfil
    evidence_kind: tool_call
    match:
      payload.tool: http_post
    after:
      - recon_shadow
      - recon_env
    within_seconds: 300
metadata:
  mitre_attack:
    - T1003.008   # OS Credential Dumping: /etc/passwd & /etc/shadow
    - T1552.001   # Unsecured Credentials: Credentials In Files
    - T1041       # Exfiltration Over C2 Channel
  tags:
    - exfiltration
    - multi-agent
    - dag
    - credential-access
