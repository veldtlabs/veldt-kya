# veldt-kya publish workflow
#
# Triggered by version tags. Splits between TestPyPI (rc tags) and
# real PyPI (GA tags) so the rc → soak → GA pattern works cleanly.
#
#   git tag v0.1.0rc1 && git push --tags     → TestPyPI publish
#   git tag v0.1.0 && git push --tags        → PyPI publish
#
# Authentication uses OIDC trusted publishing (no long-lived tokens).
# Setup steps on PyPI/TestPyPI side are in docs/RELEASE.md.

name: publish

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'        # GA: v0.1.0
      - 'v[0-9]+.[0-9]+.[0-9]+rc[0-9]+' # RC: v0.1.0rc1, v0.1.0rc2

# OIDC token for trusted publishing requires id-token: write
permissions:
  contents: read
  id-token: write

jobs:
  build:
    name: Build wheel + sdist
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build deps
        run: |
          python -m pip install --upgrade pip
          pip install "setuptools>=77" build

      - name: Verify tag matches pyproject.toml version
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          PYPROJECT_VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          if [ "$TAG_VERSION" != "$PYPROJECT_VERSION" ]; then
            echo "::error::Tag v${TAG_VERSION} does not match pyproject.toml version ${PYPROJECT_VERSION}"
            echo "Bump pyproject.toml first, commit, then tag."
            exit 1
          fi
          echo "Tag matches pyproject.toml: ${TAG_VERSION}"

      - name: Build
        run: python -m build

      - name: Inspect dist/
        run: |
          ls -la dist/
          python -c "import zipfile; z=zipfile.ZipFile([f for f in __import__('os').listdir('dist') if f.endswith('.whl')][0] and 'dist/' + [f for f in __import__('os').listdir('dist') if f.endswith('.whl')][0]); print('\n'.join(z.namelist()[:30]))"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

  # ──────────────────────────────────────────────────────────────────
  # TestPyPI publish (RC tags only)
  # ──────────────────────────────────────────────────────────────────
  publish-testpypi:
    name: Publish to TestPyPI
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: contains(github.ref, 'rc')
    environment:
      name: testpypi
      url: https://test.pypi.org/project/veldt-kya/
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to TestPyPI via trusted publishing
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  # ──────────────────────────────────────────────────────────────────
  # PyPI publish (GA tags only — no rc suffix)
  # ──────────────────────────────────────────────────────────────────
  publish-pypi:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: ${{ !contains(github.ref, 'rc') }}
    environment:
      name: pypi
      url: https://pypi.org/project/veldt-kya/
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI via trusted publishing
        uses: pypa/gh-action-pypi-publish@release/v1
