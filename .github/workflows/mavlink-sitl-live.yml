# MAVLink live integration test against ArduPilot SITL.
#
# Runs the live capture script (Docker spin of the official
# ArduPilot SITL container) followed by the parser integration
# test. Lives in its own workflow because SITL boot can be flaky
# on hosted runners (network + Docker daemon variance); keeping
# it out of the gating ``build`` workflow means a SITL hiccup
# doesn't block every PR.
#
# Triggers:
#   - workflow_dispatch (manual)
#   - push to main / develop on changes to the MAVLink parser
#     or the SITL harness itself
#   - pull_request when those same paths change
#
# A green run here proves the parser correctly canonicalises every
# frame a real ArduPilot autopilot emits during a scripted ARM ->
# takeoff -> RTL cycle.

name: mavlink-sitl-live

on:
  workflow_dispatch:
  push:
    branches: [main, develop]
    paths:
      - "kya/runtime/parsers/mavlink/**"
      - "scripts/mavlink_sitl_live_capture.py"
      - "tests/test_mavlink_sitl_live.py"
      - ".github/workflows/mavlink-sitl-live.yml"
  pull_request:
    paths:
      - "kya/runtime/parsers/mavlink/**"
      - "scripts/mavlink_sitl_live_capture.py"
      - "tests/test_mavlink_sitl_live.py"
      - ".github/workflows/mavlink-sitl-live.yml"

concurrency:
  group: mavlink-sitl-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

# Default-deny GITHUB_TOKEN scope. The job only reads the repo and
# uploads an artefact on failure -- no write to issues, packages,
# deployments. Defence-in-depth.
permissions:
  contents: read

jobs:
  sitl_live:
    name: ArduPilot SITL + parser
    runs-on: ubuntu-latest
    # SITL boot + scripted mission + capture is ~2 min; 10 min cap
    # absorbs cold-start container pull (~3 min on a fresh runner).
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install kya + pymavlink
        run: |
          python -m pip install --upgrade pip
          # Editable install + the [mavlink] extra (pymavlink).
          pip install -e ".[mavlink]"
          pip install pytest

      - name: Pull ArduPilot SITL Docker image
        # Pre-pull so the capture-script timeout isn't burnt on
        # the cold image pull. Retry 3x with backoff -- hosted
        # runners fail to pull on cold start ~1% of the time and
        # we don't want that to break demo-readiness CI.
        run: |
          set -e
          for attempt in 1 2 3; do
            if docker pull ardupilot/ardupilot-dev-base:latest; then
              exit 0
            fi
            echo "pull attempt $attempt failed; backing off..."
            sleep $((attempt * 10))
          done
          echo "all 3 pull attempts failed"
          exit 1

      - name: Capture live SITL frames
        env:
          OUT: /tmp/mavlink-sitl.json
          TIMEOUT: "180"
          MISSION: "30"
        run: python scripts/mavlink_sitl_live_capture.py

      - name: Run live integration test
        env:
          MAVLINK_SITL_CAPTURE: /tmp/mavlink-sitl.json
        run: pytest tests/test_mavlink_sitl_live.py -v

      - name: Upload capture artefact on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: mavlink-sitl-capture
          path: /tmp/mavlink-sitl.json
          if-no-files-found: ignore
          retention-days: 7
