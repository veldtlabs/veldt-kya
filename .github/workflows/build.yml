# veldt-kya build + verify
#
# On every PR or push to main/develop:
#   1. ruff lint + format (style + safety)
#   2. wheel build + clean-venv install (packaging integrity, no source-tree leak)
#   3. pytest matrix on Python 3.10 / 3.11 / 3.12
#   4. MySQL + PostgreSQL service containers for the dialect-specific tests
#
# Adapted from veldt-decisions/.github/workflows/sdk-build.yml when KYA
# moved to its own repo (open-core split, Apache-2.0).

name: build

on:
  pull_request:
    # No paths filter: branch protection requires these checks, so the
    # workflow must run on every PR -- including doc-only changes --
    # or auto-merge gets stuck waiting on a check that never fires.
    # The job itself is cheap (lint + wheel build + tests, ~5 min).
  push:
    branches: [main, develop]
  workflow_dispatch:

concurrency:
  group: build-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  test:
    name: Python ${{ matrix.python }} · wheel + tests
    runs-on: ubuntu-latest
    # Bumped from 15 to 30 in v0.1.6: PG + MySQL service containers
    # + the expanded test set (new CI guard scope across 4 packages
    # + window-filter tests + decisions-schema split coverage) run
    # ~13-15 min on Actions hosted runners. 15-min cap was tripping
    # the job into CANCELLED state right at the finish line.
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        python: ["3.10", "3.11", "3.12"]

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: kya_test
          MYSQL_DATABASE: kya_test
          MYSQL_ROOT_HOST: '%'
        ports: ["3306:3306"]
        options: >-
          --health-cmd "mysqladmin ping -h localhost -ukya_test -pkya_test"
          --health-interval 5s --health-timeout 5s --health-retries 20

      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: kya_test
          POSTGRES_DB: kya_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s --health-timeout 5s --health-retries 20

    env:
      KYA_TEST_PG_URL: postgresql+psycopg2://postgres:kya_test@127.0.0.1:5432/kya_test
      KYA_TEST_MYSQL_URL: mysql+pymysql://root:kya_test@127.0.0.1:3306/kya_test
      # v0.1.6: KYA_VERSIONS_SCHEMA unset -> tables go to dialect's
      # default schema (public on PG, main on SQLite). This is the
      # new v0.1.6 default behavior. Setting it forces prov_schema
      # prefix into ALL backend queries (including SQLite/MySQL),
      # breaking non-PG tests since their fixtures no longer carry
      # the schema_translate_map stripped during the v0.1.6 cleanup.

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip

      - name: Install build deps + ruff
        run: |
          python -m pip install --upgrade pip
          pip install "setuptools>=77" build ruff

      - name: Ruff lint
        run: ruff check kya/ kya_hooks/ kya_otlp_bridge/ kya_redteam/

      - name: Build wheel
        run: |
          python -m build --wheel
          ls -la dist/

      - name: Create prov_schema on PostgreSQL
        run: |
          sudo apt-get update && sudo apt-get install -y postgresql-client
          PGPASSWORD=kya_test psql -h 127.0.0.1 -U postgres -d kya_test \
              -c "CREATE SCHEMA IF NOT EXISTS prov_schema;"

      - name: Install wheel in clean venv + run pytest
        run: |
          python -m venv /tmp/v
          /tmp/v/bin/pip install --upgrade pip
          # Install the wheel with the [did] + [gateway] extras so
          # Phase 3d / Phase 4 tests can collect (they import jwt,
          # yaml, fastapi, httpx, sse-starlette).
          WHEEL=$(ls dist/*.whl)
          /tmp/v/bin/pip install "${WHEEL}[did,gateway]"
          /tmp/v/bin/pip install pytest psycopg2-binary pymysql duckdb duckdb-engine pytz prometheus_client cryptography python-dotenv
          /tmp/v/bin/python -m pytest tests/ -v --tb=short

      - name: Smoke from installed wheel
        run: /tmp/v/bin/python examples/sdk_smoke_test.py

      # PYPI SHOULD-DO item 10: wheel-install behavioral parity.
      # The pytest step above runs from repo root, so kya imports could
      # resolve from the source tree rather than the wheel. This step
      # cd's into /tmp (no source on path) and verifies the wheel-
      # installed kya is what's actually being imported, and exercises
      # the major public surfaces from that wheel.
      - name: Wheel parity (kya imported from installed wheel)
        run: |
          cd /tmp && /tmp/v/bin/python -c "
          import os
          import kya
          src = os.path.abspath(kya.__file__)
          assert '/tmp/v/' in src, f'kya is NOT from the installed wheel: {src}'
          # Exercise the major public surfaces from the wheel-installed kya.
          from kya import score_agent, normalize_agent_def, default_session
          r = score_agent({'agent_key':'wheel_parity','tools':['t'],'human_loop':'in_the_loop'})
          assert 0 <= r.score <= 100, f'score out of range: {r.score}'
          assert r.bucket in ('low','medium','high','critical')
          normed = normalize_agent_def('langchain', {'name':'lc','tools':['t']})
          assert normed['agent_key'] == 'lc'
          # Sibling packages must also resolve from the wheel.
          import kya_hooks, kya_otlp_bridge, kya_redteam
          for mod in (kya_hooks, kya_otlp_bridge, kya_redteam):
              assert '/tmp/v/' in os.path.abspath(mod.__file__), f'{mod.__name__} not from wheel'
          print(f'Wheel parity OK: kya from {src}')
          "

  # ────────────────────────────────────────────────────────────────────
  # Cleanroom install matrix (PYPI release-blocker item 3)
  #
  # Verifies the wheel installs and the SDK works on every supported
  # Python × OS combo, not just the ubuntu cell that runs the full DB
  # suite above. macOS/Windows runners do not get PG/MySQL services
  # in GH-hosted runners, so this job covers the SQLite-only smoke
  # path (which is also the default zero-config customer experience).
  # ────────────────────────────────────────────────────────────────────
  cleanroom:
    name: Cleanroom · ${{ matrix.os }} · Python ${{ matrix.python }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python: ["3.10", "3.11", "3.12"]
        # Exclude the cell already covered exhaustively by the `test`
        # job above (ubuntu × all Python versions runs the full DB suite).
        exclude:
          - os: ubuntu-latest
            python: "3.10"
          - os: ubuntu-latest
            python: "3.11"
          - os: ubuntu-latest
            python: "3.12"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip

      - name: Build wheel
        run: |
          python -m pip install --upgrade pip
          pip install "setuptools>=77" build
          python -m build --wheel

      - name: Install wheel in fresh venv + smoke test
        shell: bash
        env:
          # Force UTF-8 for Windows console output — sdk_smoke_test prints
          # non-ASCII glyphs (arrows, en-dashes) that crash cp1252 stdout.
          PYTHONIOENCODING: utf-8
        run: |
          python -m venv .v
          if [ -d ".v/Scripts" ]; then
            VPY=".v/Scripts/python"
          else
            VPY=".v/bin/python"
          fi
          "$VPY" -m pip install --upgrade pip
          "$VPY" -m pip install dist/*.whl
          "$VPY" -m pip install cryptography  # for the four-gate test
          "$VPY" -c "import kya; print('kya', kya.__version__)"
          "$VPY" -c "from kya import score_agent, normalize_agent_def, default_session; r = score_agent({'agent_key':'x','tools':['t'],'human_loop':'in_the_loop'}); print('score', r.score, r.bucket)"
          "$VPY" -c "import kya_hooks, kya_otlp_bridge, kya_redteam; print('siblings OK')"
          "$VPY" examples/sdk_smoke_test.py
          "$VPY" examples/four_gate_adversarial_test.py

  # ────────────────────────────────────────────────────────────────────
  # Optional extras install matrix (PYPI SHOULD-DO item 9)
  #
  # Each extra has a corresponding gated import in the SDK. Install
  # the wheel WITH ONLY that extra in a fresh venv, then verify the
  # gated import wakes up. Catches the silent-disable failure mode
  # where an extra is declared in pyproject.toml but its consumer
  # module has a bad import path or unmet transitive dep.
  # ────────────────────────────────────────────────────────────────────
  extras:
    name: Extras · ${{ matrix.extra }}
    runs-on: ubuntu-latest
    timeout-minutes: 8
    needs: cleanroom
    strategy:
      fail-fast: false
      matrix:
        include:
          - extra: metrics
            verify: |
              import prometheus_client
              from prometheus_client import Counter
              c = Counter("kya_extras_test", "test"); c.inc()
              print("metrics OK:", prometheus_client.__version__ if hasattr(prometheus_client, "__version__") else "imported")
          - extra: tracing
            verify: |
              from opentelemetry import trace
              tracer = trace.get_tracer("kya-extras-test")
              with tracer.start_as_current_span("test") as span:
                  span.set_attribute("ok", True)
              print("tracing OK")
          - extra: webhooks
            verify: |
              import requests
              print("webhooks OK:", requests.__version__)
          - extra: judge
            verify: |
              # kya.llm_judge was removed in the "KYA = governance,
              # not detection" cleanup. The [judge] extra now exists
              # to install litellm, which the multi-judge
              # orchestrator's arize_phoenix + openai_judge adapters
              # use via the scorer_orchestrator. Verify litellm is
              # importable and the orchestrator can register Phoenix.
              import litellm
              from kya.scorer_orchestrator import (
                  register_phoenix_adapter, list_judges)
              register_phoenix_adapter()
              assert "arize_phoenix" in list_judges()
              print("judge OK: litellm + phoenix shim registered")
          - extra: dotenv
            verify: |
              # The [dotenv] extra installs python-dotenv. `import kya`
              # then calls load_dotenv(dotenv_path=Path.cwd()/.env,
              # override=False) so a project-root .env populates
              # os.environ before the LLM judges read provider keys.
              # Bug B regression guard.
              import os
              import tempfile
              with tempfile.TemporaryDirectory() as td:
                  with open(os.path.join(td, ".env"), "w") as f:
                      f.write("KYA_DOTENV_EXTRAS_TEST=loaded\n")
                  os.chdir(td)
                  import kya  # noqa: F401  -- the import IS the test
                  assert os.environ.get("KYA_DOTENV_EXTRAS_TEST") == "loaded", (
                      "Bug B regression: import kya did not load .env"
                  )
              print("dotenv OK: load_dotenv fired on import kya")
          - extra: all
            verify: |
              import prometheus_client
              from opentelemetry import trace
              import requests
              import litellm
              print("all OK")

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Build wheel
        run: |
          python -m pip install --upgrade pip
          pip install "setuptools>=77" build
          python -m build --wheel

      - name: Install veldt-kya[${{ matrix.extra }}] in fresh venv + verify gate
        shell: bash
        run: |
          python -m venv .v
          .v/bin/pip install --upgrade pip
          # Install the wheel with the specific extra. --find-links points pip
          # at the local dist/, --no-cache-dir avoids cross-job cache contamination.
          WHEEL=$(ls dist/*.whl)
          .v/bin/pip install --no-cache-dir "veldt-kya[${{ matrix.extra }}] @ file://$PWD/$WHEEL"
          # Run the per-extra verification snippet — confirms the gated
          # import wakes up, not just that pip resolved the dependency.
          .v/bin/python - <<'PYEOF'
          ${{ matrix.verify }}
          PYEOF
